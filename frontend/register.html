<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Sam Tasks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">✓</div>
      <h1>Sam Tasks</h1>
    </div>
    <p class="auth-subtitle">Create your account</p>

    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="full-name">Full name</label>
        <input type="text" id="full-name" required placeholder="Your Name" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@company.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" required placeholder="••••••••" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Create account</button>
      <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
    </form>

    <div id="error-msg" class="error-msg hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
