<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Sam Tasks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>Sam Tasks</h1>
    <p class="auth-subtitle">Create Your Account</p>
    
    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" required placeholder="Your Name">
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="your@email.com">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
      </div>
      
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
    </form>
    
    <div id="error-msg" class="error-msg hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
