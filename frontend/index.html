<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam Tasks - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Sam Tasks</div>
    <div class="nav-user">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn btn-small">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>My Tasks</h1>
      <div class="header-actions">
        <button id="manage-projects-btn" class="btn btn-secondary">⚙️ Manage Projects</button>
        <button id="add-task-btn" class="btn btn-primary">+ Add Task</button>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label>Project:</label>
        <select id="filter-project">
          <option value="">All Projects</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status:</label>
        <select id="filter-status">
          <option value="">All Statuses</option>
          <option value="not_started">Not Started</option>
          <option value="in_progress">In Progress</option>
          <option value="waiting">Waiting</option>
          <option value="done">Done</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Priority:</label>
        <select id="filter-priority">
          <option value="">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>

    <div id="task-list" class="task-list"></div>
    <div id="empty-state" class="empty-state hidden">
      <p>No tasks found. Click "Add Task" to create one!</p>
    </div>
  </div>

  <!-- Add/Edit Task Modal -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Add Task</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      
      <form id="task-form">
        <input type="hidden" id="task-id">
        
        <div class="form-group">
          <label for="task-title">Title *</label>
          <input type="text" id="task-title" required placeholder="What needs to be done?">
        </div>
        
        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" rows="3" placeholder="Additional details..."></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="task-project">Project</label>
            <select id="task-project">
              <option value="">No Project</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="task-due-date">Due Date</label>
            <input type="date" id="task-due-date">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="task-status">Status</label>
            <select id="task-status">
              <option value="not_started">Not Started</option>
              <option value="in_progress">In Progress</option>
              <option value="waiting">Waiting</option>
              <option value="done">Done</option>
              <option value="custom">Custom...</option>
            </select>
          </div>
        </div>
        
        <div class="form-group hidden" id="custom-status-group">
          <label for="task-custom-status">Custom Status</label>
          <input type="text" id="task-custom-status" placeholder="e.g., Waiting for client, On hold...">
        </div>
        
        <div class="form-group">
          <label for="task-repeat">Repeat</label>
          <select id="task-repeat">
            <option value="none">No Repeat</option>
            <option value="daily">Daily</option>
            <option value="weekdays">Every Weekday (Mon-Fri)</option>
            <option value="weekly">Weekly (choose days)</option>
            <option value="monthly">Monthly (choose date)</option>
          </select>
        </div>
        
        <div class="form-group hidden" id="repeat-days-group">
          <label id="repeat-days-label">Repeat Days</label>
          <div id="repeat-days-checkboxes" style="display:flex; gap:10px; flex-wrap:wrap;">
            <label><input type="checkbox" class="repeat-day" value="1"> Mon</label>
            <label><input type="checkbox" class="repeat-day" value="2"> Tue</label>
            <label><input type="checkbox" class="repeat-day" value="3"> Wed</label>
            <label><input type="checkbox" class="repeat-day" value="4"> Thu</label>
            <label><input type="checkbox" class="repeat-day" value="5"> Fri</label>
            <label><input type="checkbox" class="repeat-day" value="6"> Sat</label>
            <label><input type="checkbox" class="repeat-day" value="0"> Sun</label>
          </div>
          <input type="number" id="repeat-day-of-month" min="1" max="31" placeholder="Day of month (1-31)" style="display:none; margin-top:8px;">
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Project Modal -->
  <div id="project-modal" class="modal hidden">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2>Manage Projects</h2>
        <button class="modal-close" onclick="closeProjectModal()">&times;</button>
      </div>
      
      <div class="project-layout">
        <!-- Project List with Stats -->
        <div class="project-list-section">
          <div id="project-list"></div>
        </div>
        
        <!-- Add/Edit Form -->
        <div class="project-form-section">
          <h3 id="project-form-title">Add Project</h3>
          <form id="project-form">
            <input type="hidden" id="project-id">
            <div class="form-group">
              <label for="project-name">Project Name *</label>
              <input type="text" id="project-name" required placeholder="e.g., Toshiba Campaign">
            </div>
            
            <div class="form-group">
              <label for="project-color">Color</label>
              <div style="display:flex;gap:8px;align-items:center;">
                <input type="color" id="project-color" value="#6366f1" style="width:60px;height:36px;padding:2px;">
                <span style="color:#888;font-size:12px;">Used for project badge</span>
              </div>
            </div>
            
            <div class="modal-actions">
              <button type="button" class="btn btn-secondary" id="cancel-project-btn">Cancel</button>
              <button type="submit" class="btn btn-primary">Save Project</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
