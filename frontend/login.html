<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sam Tasks</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">✓</div>
      <h1>Sam Tasks</h1>
    </div>
    <p class="auth-subtitle">Sign in to your workspace</p>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@company.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      <p class="auth-link">Don't have an account? <a href="register.html">Create one</a></p>
    </form>

    <div id="error-msg" class="error-msg hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
